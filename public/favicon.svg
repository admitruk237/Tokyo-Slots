<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#1a0533"/>

  <!-- Slot machine body -->
  <rect x="4" y="8" width="24" height="16" rx="3" fill="#3d0d7a"/>
  <rect x="4" y="8" width="24" height="16" rx="3" fill="url(#bodyGrad)"/>

  <!-- Three reel windows -->
  <rect x="6" y="10" width="6" height="12" rx="2" fill="#0d0020"/>
  <rect x="13" y="10" width="6" height="12" rx="2" fill="#0d0020"/>
  <rect x="20" y="10" width="6" height="12" rx="2" fill="#0d0020"/>

  <!-- Lucky 7s -->
  <text x="9" y="19" font-family="Arial Black, Arial" font-weight="900" font-size="9" fill="#ffe84d" text-anchor="middle">7</text>
  <text x="16" y="19" font-family="Arial Black, Arial" font-weight="900" font-size="9" fill="#ffe84d" text-anchor="middle">7</text>
  <text x="23" y="19" font-family="Arial Black, Arial" font-weight="900" font-size="9" fill="#ffe84d" text-anchor="middle">7</text>

  <!-- Lever -->
  <rect x="28" y="9" width="2.5" height="9" rx="1.2" fill="#47bfff"/>
  <circle cx="29.2" cy="9" r="2" fill="#47bfff"/>

  <!-- Bottom bar / coin slot -->
  <rect x="11" y="25" width="10" height="2.5" rx="1.2" fill="#47bfff" opacity="0.8"/>

  <!-- Top light strip -->
  <rect x="5" y="6" width="22" height="3" rx="1.5" fill="#863bff"/>
  <rect x="5" y="6" width="22" height="3" rx="1.5" fill="url(#topGrad)" opacity="0.8"/>

  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7e14ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#863bff"/>
      <stop offset="50%" stop-color="#47bfff"/>
      <stop offset="100%" stop-color="#863bff"/>
    </linearGradient>
  </defs>
</svg>
